<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF 表格转 Excel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">PDF TABLE PIPELINE</p>
      <h1>拖入 PDF，直接下载最终 Excel</h1>
      <p class="sub">自动处理前 4 页，页 1-2 输出 table_1，页 3-4 输出 table_2。已内置清洗和拆分逻辑。</p>
    </section>

    <section class="panel">
      <form id="uploadForm" class="dropzone" action="/api/convert" method="post" enctype="multipart/form-data">
        <input id="fileInput" type="file" name="file" accept=".pdf,application/pdf" hidden>
        <div class="dropzone-inner">
          <div class="icon">PDF</div>
          <p class="line1">把文件拖到这里，或点击选择</p>
          <p class="line2" id="filename">尚未选择文件</p>
        </div>
      </form>

      <div class="actions">
        <button id="pickBtn" type="button" class="btn ghost">选择文件</button>
        <button id="runBtn" type="button" class="btn solid">开始转换并下载</button>
      </div>

      <div id="status" class="status">等待上传 PDF</div>
      <p class="hint">提示: 仅处理前 4 页，自动跳过第 5 页图形页。</p>
    </section>
  </main>

  <script>
    const dropzone = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const pickBtn = document.getElementById('pickBtn');
    const runBtn = document.getElementById('runBtn');
    const statusEl = document.getElementById('status');
    const filenameEl = document.getElementById('filename');

    let selectedFile = null;

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.classList.toggle('error', isError);
    }

    function setFile(file) {
      selectedFile = file;
      if (file) {
        filenameEl.textContent = `${file.name} (${Math.round(file.size / 1024)} KB)`;
        setStatus('文件已就绪，点击“开始转换并下载”');
      } else {
        filenameEl.textContent = '尚未选择文件';
        setStatus('等待上传 PDF');
      }
    }

    function validatePdf(file) {
      if (!file) return '未选择文件';
      const nameOk = file.name.toLowerCase().endsWith('.pdf');
      if (!nameOk) return '只支持 PDF 文件';
      return '';
    }

    async function runConvert() {
      const err = validatePdf(selectedFile);
      if (err) {
        setStatus(err, true);
        return;
      }

      const fd = new FormData();
      fd.append('file', selectedFile);

      runBtn.disabled = true;
      pickBtn.disabled = true;
      setStatus('正在转换，请稍候...');

      try {
        const resp = await fetch('/api/convert', {
          method: 'POST',
          body: fd,
        });

        if (!resp.ok) {
          let msg = `转换失败（${resp.status}）`;
          try {
            const j = await resp.json();
            if (j && j.message) msg = j.message;
          } catch (_) {}
          throw new Error(msg);
        }

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);

        const cd = resp.headers.get('Content-Disposition') || '';
        const match = cd.match(/filename\*=UTF-8''([^;]+)|filename="?([^";]+)"?/i);
        const downName = decodeURIComponent((match && (match[1] || match[2])) || 'output_final.xlsx');

        const a = document.createElement('a');
        a.href = url;
        a.download = downName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus('转换完成，Excel 已开始下载');
      } catch (e) {
        setStatus(e.message || '转换失败', true);
      } finally {
        runBtn.disabled = false;
        pickBtn.disabled = false;
      }
    }

    pickBtn.addEventListener('click', () => fileInput.click());
    runBtn.addEventListener('click', runConvert);

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      setFile(file || null);
    });

    ['dragenter', 'dragover'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragging');
      });
    });

    ['dragleave', 'drop'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragging');
      });
    });

    dropzone.addEventListener('drop', (e) => {
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!file) return;
      fileInput.files = e.dataTransfer.files;
      setFile(file);
    });

    dropzone.addEventListener('click', () => fileInput.click());
  </script>
</body>
</html>
